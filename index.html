<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Beryl ❤️</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:'Segoe UI',sans-serif;
overflow:hidden;
background-image:url('background.png');
background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;
color:white;height:100vh;
}
.container{
position:relative;z-index:10;display:flex;flex-direction:column;
justify-content:center;align-items:center;height:100vh;
text-align:center;padding:20px;
}
h1{margin-bottom:20px}
.message{
max-width:800px;line-height:1.8;font-size:1.2rem;
min-height:220px;
text-shadow:0 0 10px rgba(0,0,0,.8);
}
button{
margin:10px;padding:12px 24px;border:none;border-radius:50px;
cursor:pointer;font-size:1rem;transition:.3s;
}
.primary{background:#ff4d6d;color:white}
.secondary{background:white;color:#333}
button:hover{transform:scale(1.05)}
.hidden{display:none}

.star{
position:absolute;background:white;border-radius:50%;
animation:twinkle 3s infinite;
}
@keyframes twinkle{
0%,100%{opacity:.2}
50%{opacity:1}
}

.heart{
position:fixed;
font-size:24px;
animation:heartFall 5s linear forwards;
z-index:10001;
}
@keyframes heartFall{
from{transform:translateY(-100px);opacity:1}
to{transform:translateY(110vh);opacity:0}
}

.sakura{
position:fixed;
top:-30px;
pointer-events:none;
z-index:2;
animation-name:sakuraFall;
animation-timing-function:linear;
}
@keyframes sakuraFall{
0%{transform:translateX(0) rotate(0deg);opacity:1}
25%{transform:translateX(40px) rotate(90deg)}
50%{transform:translateX(-40px) rotate(180deg)}
75%{transform:translateX(20px) rotate(270deg)}
100%{
transform:translateY(110vh) translateX(-20px) rotate(360deg);
opacity:.6;
}
}

#loveOverlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.88);
backdrop-filter:blur(20px);
z-index:9999;
opacity:0;
animation:fadeBlack 2s forwards;
}
@keyframes fadeBlack{
from{opacity:0}
to{opacity:1}
}

.loveText{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
font-size:3rem;
max-width:900px;
animation:appear 1.5s forwards;
}
@keyframes appear{
from{opacity:0;transform:translate(-50%,-50%) scale(.5)}
to{opacity:1;transform:translate(-50%,-50%) scale(1)}
}

.fade-message{
    opacity:0;
    transform:translateY(15px);
    animation:fadeInMessage 1.6s ease forwards;
}

@keyframes fadeInMessage{
    from{
        opacity:0;
        transform:translateY(15px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>
<body>

<audio id="bgMusic" loop>
<source src="song.mp3" type="audio/mpeg">
</audio>

<div id="stars"></div>

<div class="container">
<h1>🌙 Untuk Kamu</h1>

<div class="message" id="message">
Ada sesuatu yang ingin ku sampaikan...
</div>

<button class="primary" id="startBtn">Klik di sini 🌹</button>

<div id="answerButtons" class="hidden">
<button class="primary" onclick="accepted()">Mau ❤️</button>
<button class="secondary" onclick="thinking()">Aku perlu waktu 🌸</button>
</div>
</div>

<script>
const stars=document.getElementById('stars');

for(let i=0;i<120;i++){
 const star=document.createElement('div');
 star.classList.add('star');
 star.style.width=Math.random()*3+'px';
 star.style.height=star.style.width;
 star.style.left=Math.random()*100+'vw';
 star.style.top=Math.random()*100+'vh';
 stars.appendChild(star);
}

const messages=[
"Berawal dari comment moment di Lita.",
"Seorang wanita cantik menemaniku.",
"Tanpa sadar, kamu jadi salah satu bagian terbaik dalam hariku.",
"Setiap notifikasi darimu selalu berhasil membuatku tersenyum.",
"Sejujurnya ku takut membuat kamu kecewa.",
"Tapi aku tidak mau kehilangan orang yang bernilai dalam hidupku.",
"",
"❤️ Aku suka kamu ❤️",
"",
"Aku ingin mengenalmu lebih dekat lagi.",
"Bukan hanya sebagai teman."
];

const messageEl=document.getElementById('message');
const startBtn=document.getElementById('startBtn');
const answerButtons=document.getElementById('answerButtons');

startBtn.addEventListener('click', async ()=>{

 const music=document.getElementById('bgMusic');
 music.volume=0;
 music.play().catch(()=>{});

 let fade=setInterval(()=>{
   if(music.volume<0.5){ music.volume+=0.05; }
   else clearInterval(fade);
 },300);

 startBtn.classList.add('hidden');
 messageEl.innerHTML='';

 for(let msg of messages){
   const p=document.createElement('p');
   p.classList.add('fade-message');
   p.innerHTML=msg;
   messageEl.appendChild(p);
   await new Promise(r=>setTimeout(r,3200));
 }

 const question=document.createElement('h2');
 question.classList.add('fade-message');
 question.style.marginTop='20px';
 question.innerHTML='Maukah kamu memberi kesempatan untuk kita menulis cerita baru bersama? 🌹';
 messageEl.appendChild(question);

 answerButtons.classList.remove('hidden');
});

function thinking(){
 messageEl.innerHTML=`
 <h2>🌸 Tidak apa-apa</h2>
 <p style="margin-top:20px">
 Perasaan yang tulus tidak perlu dipaksa.<br>
 Aku akan menghargai apa pun keputusanmu.<br>
 Terima kasih sudah membaca sampai akhir 😊
 </p>`;
 answerButtons.classList.add('hidden');
}

function createSakura(){
 const sakura=document.createElement('div');
 sakura.classList.add('sakura');
 sakura.innerHTML='🌸';
 sakura.style.left=Math.random()*window.innerWidth+'px';
 sakura.style.fontSize=(Math.random()*15+15)+'px';
 sakura.style.animationDuration=(Math.random()*5+8)+'s';
 document.body.appendChild(sakura);
 setTimeout(()=>sakura.remove(),13000);
}
setInterval(createSakura,250);

function createPetalExplosion(){
 for(let i=0;i<250;i++){
   const petal=document.createElement('div');
   petal.innerHTML='🌸';
   petal.style.position='fixed';
   petal.style.left='50%';
   petal.style.top='50%';
   petal.style.fontSize=(Math.random()*20+15)+'px';
   petal.style.zIndex='10000';

   const angle=Math.random()*360;
   const distance=Math.random()*900;

   petal.animate([
     {transform:'translate(0,0) scale(.5)',opacity:1},
     {transform:`translate(${Math.cos(angle*Math.PI/180)*distance}px,${Math.sin(angle*Math.PI/180)*distance}px) scale(1.5)`,opacity:0}
   ],{
     duration:4000,
     easing:'cubic-bezier(.17,.67,.83,.67)'
   });

   document.body.appendChild(petal);
   setTimeout(()=>petal.remove(),4000);
 }
}

function startHeartRain(){
 setInterval(()=>{
   const heart=document.createElement('div');
   heart.classList.add('heart');
   heart.innerHTML='❤️';
   heart.style.left=Math.random()*100+'vw';
   document.body.appendChild(heart);
   setTimeout(()=>heart.remove(),5000);
 },150);
}

function accepted(){

 answerButtons.classList.add('hidden');

 const overlay=document.createElement('div');
 overlay.id='loveOverlay';
 document.body.appendChild(overlay);

 setTimeout(()=>{

   overlay.innerHTML=`
   <div class="loveText" id="countdown">3</div>
   `;

   let count=3;

   const interval=setInterval(()=>{

     count--;

     if(count>0){
       document.getElementById('countdown').innerHTML=count;
     }else{

       clearInterval(interval);

       document.getElementById('countdown').innerHTML='❤️<br>Terima Kasih Beryl...';

       createPetalExplosion();

       setTimeout(()=>{

         overlay.innerHTML=`
         <div class="loveText">
           ❤️ Selamat Datang di Babak Baru Cerita Kita ❤️
           <br><br>
           <div style="font-size:1.2rem">
             Hari dimana kamu bilang "Iya"
           </div>
         </div>`;

         startHeartRain();

       },3000);
     }

   },1000);

 },1000);
}
</script>
</body>
</html>
